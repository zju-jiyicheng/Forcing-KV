denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true # need to remove - 0 in denoising_step_list if warp_denoising_step is true
num_frame_per_block: 3
model_name: /nfs/ycji_temp/code/DummyForcing/pretrained/Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 21
  timestep_shift: 5.0
  sink_size: 3

dummy_forcing:
  denoise_start: 0 # we compute and perform dummy head pruning from the ARstep@ar_start and denoiseTime@denoise_start
  ar_start: 2
  local_context_length: 1 # the context length for local heads
  num_dummy: 180
  teacache_enabled: false
  teacache_threshold: 0.2

# inference
method: longlive
data_path: prompts/example_prompts_5.txt
output_folder: videos/inference/longlive_30s/attn21_sink3
inference_iter: -1
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
profile: true
save_with_index: true
global_sink: true
context_noise: 0
resolution: 480

generator_ckpt: /nfs/ycji_temp/code/DummyForcing/pretrained/LongLive-1.3B/models/longlive_base.pt
lora_ckpt: /nfs/ycji_temp/code/DummyForcing/pretrained/LongLive-1.3B/models/lora.pt

adapter:
  type: "lora"
  rank: 256                    # LoRA rank (typical values: 8, 16, 32, 64)
  alpha: 256                   # LoRA alpha (typically same as rank, but can be different)
  dropout: 0.0                # LoRA dropout rate
  dtype: "bfloat16"          # Data type for LoRA parameters: "bfloat16", "float16", "float32"
  verbose: false              # Whether to print all target module names