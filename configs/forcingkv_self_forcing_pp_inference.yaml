denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true # need to remove - 0 in denoising_step_list if warp_denoising_step is true
num_frame_per_block: 3
model_name: /nfs/ycji_temp/code/DummyForcing/pretrained/Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: -1
  timestep_shift: 5.0
  sink_size: 0

forcingkv:
  ar_start: 4
  spatial_context_length: 1 # active in forcingkv, unit is HW
  temporal_context_length: 6 # active in forcingkv, unit is HW (3 == old local_context_length 1)
  dynamic_context_length: 3
  # Teacache
  teacache_enabled: false
  teacache_threshold: 0.2
  # Dynamic KV Cache
  dynamic_temporal_enabled: false
  num_frame_patch: 1
  patch_num: [1,1]
  sim_retention_ratio: 0.5
  # Offline Head Classification
  use_offline_head: true
  offline_head_file: configs_head/forcingkv_heads_selfforcing_pp_human.json


# inference
method: forcingkv
data_path: prompts/example_prompts_5.txt
output_folder: videos/inference/forcingkv_head_function_v2/self_forcing_pp/ar_4_sink0_spatial_1_temporal_6
inference_iter: -1
num_output_frames: 120 #21
use_ema: true
seed: 0
num_samples: 1
profile: true
save_with_index: true
global_sink: true
context_noise: 0
resolution: 480

generator_ckpt: /nfs/ycji_temp/code/Self-Forcing/logs/self_forcing_pp_resume_bs8_rollout120/checkpoint_model_002400/model.pt
lora_ckpt: ~

adapter:
  type: "lora"
  rank: 256                    # LoRA rank (typical values: 8, 16, 32, 64)
  alpha: 256                   # LoRA alpha (typically same as rank, but can be different)
  dropout: 0.0                # LoRA dropout rate
  dtype: "bfloat16"          # Data type for LoRA parameters: "bfloat16", "float16", "float32"
  verbose: false              # Whether to print all target module names
